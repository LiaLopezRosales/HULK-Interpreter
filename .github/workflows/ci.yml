name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore Interpreter/HULK-Interpreter.csproj
      - run: dotnet build Interpreter/HULK-Interpreter.csproj --no-restore
      - run: dotnet test Interpreter.Tests/ --no-restore
